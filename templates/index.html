<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PubMed 文献检索工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1rem; opacity: 0.9; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .search-section { display: grid; gap: 20px; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
        }

        label { font-weight: 600; color: #333; font-size: 0.95rem; }

        input[type="text"], input[type="number"], select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px; height: 20px; cursor: pointer;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(17, 153, 142, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }

        .button-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-small { padding: 6px 16px; font-size: 0.85rem; }

        .cache-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
            background: #ccc;
        }
        .cache-status.cached {
            background: #38ef7d;
        }
        .llm-btn.active {
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.3);
        }

        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-section { display: none; }
        .results-section.active { display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h3 { font-size: 2rem; margin-bottom: 5px; }
        .stat-card p { opacity: 0.9; font-size: 0.9rem; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }
        .tab:hover { background: #f0f0f0; }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .article-list { display: flex; flex-direction: column; gap: 16px; }
        .article-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        .article-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .article-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .article-meta span { display: flex; align-items: center; gap: 5px; }
        .article-abstract {
            color: #555;
            line-height: 1.6;
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        tr:hover { background: #f8f9fa; }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 2px;
        }
        .tag-blue { background: #e3f2fd; color: #1976d2; }
        .tag-green { background: #e8f5e9; color: #388e3c; }
        .tag-purple { background: #f3e5f5; color: #7b1fa2; }

        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .alert-error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .alert-info { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }
        .modal-close:hover { color: #333; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .download-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PubMed 文献检索工具</h1>
            <p>从 PubMed 批量检索医学文献，自动生成汇总报告</p>
        </div>

        <!-- 搜索设置卡片 -->
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">文献检索设置</h2>
            <div class="search-section">
                <div class="form-group">
                    <label for="query">检索词（支持 PubMed 高级检索语法）</label>
                    <input type="text" id="query" placeholder="例如：diabetes treatment" value="">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="max_results">最大检索数量</label>
                        <input type="number" id="max_results" value="50" min="1" max="10000">
                    </div>
                    <div class="form-group">
                        <label for="sort_by">排序方式</label>
                        <select id="sort_by">
                            <option value="relevance">相关度</option>
                            <option value="pub_date">发表日期</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start_year">起始年份</label>
                        <input type="text" id="start_year" placeholder="如：2020">
                    </div>
                    <div class="form-group">
                        <label for="end_year">结束年份</label>
                        <input type="text" id="end_year" placeholder="如：2024">
                    </div>
                </div>

                <div class="form-group">
                    <label for="report_title">报告标题（可选）</label>
                    <input type="text" id="report_title" placeholder="自定义报告标题">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="use_demo">
                    <label for="use_demo" style="font-weight: normal; cursor: pointer;">
                        演示模式（使用模拟数据，无需网络）
                    </label>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="searchArticles()">
                        开始检索
                    </button>
                    <button class="btn btn-secondary" onclick="clearResults()">
                        清空结果
                    </button>
                </div>
            </div>
        </div>

        <!-- 加载状态 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #666; font-size: 1.1rem;">正在检索文献，请稍候...</p>
            <p style="color: #999; font-size: 0.9rem; margin-top: 10px;">首次检索可能需要较长时间</p>
        </div>

        <!-- 结果区域 -->
        <div class="results-section" id="results">
            <!-- 统计卡片 -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- 下载区域 -->
            <div class="card" id="downloadCard" style="display: none;">
                <h3 style="margin-bottom: 15px;">生成报告</h3>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>输出格式</label>
                    <div class="button-group" id="reportFormatGroup">
                        <button class="btn btn-success btn-small format-btn active" data-format="both" onclick="selectFormat(this, 'both')">Word + Excel</button>
                        <button class="btn btn-secondary btn-small format-btn" data-format="word" onclick="selectFormat(this, 'word')">仅 Word</button>
                        <button class="btn btn-secondary btn-small format-btn" data-format="excel" onclick="selectFormat(this, 'excel')">仅 Excel</button>
                    </div>
                </div>
                <div id="downloadLinks" class="download-section"></div>
            </div>

            <!-- 智能分析面板 -->
            <div class="card" id="analysisCard" style="display: none;">
                <h3 style="margin-bottom: 20px; color: #333;">智能文献分析</h3>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>分析类型</label>
                    <div class="button-group" id="analysisTypeGroup">
                        <button class="btn btn-primary btn-small analysis-btn active" data-type="full" onclick="selectAnalysisType(this, 'full')">完整分析</button>
                        <button class="btn btn-secondary btn-small analysis-btn" data-type="topics" onclick="selectAnalysisType(this, 'topics')">研究主题</button>
                        <button class="btn btn-secondary btn-small analysis-btn" data-type="trends" onclick="selectAnalysisType(this, 'trends')">研究趋势</button>
                        <button class="btn btn-secondary btn-small analysis-btn" data-type="gaps" onclick="selectAnalysisType(this, 'gaps')">知识缺口</button>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>LLM 智能综述（可选）</label>
                    <input type="password" id="llmApiKey" placeholder="输入 DeepSeek/OpenAI API Key（可选）" style="margin-bottom: 10px;">
                    <div class="button-group" id="llmButtonGroup">
                        <button class="btn btn-warning btn-small llm-btn" data-type="review" onclick="runLLMReview('review')">
                            生成文献综述 <span class="cache-status" id="cache-review"></span>
                        </button>
                        <button class="btn btn-warning btn-small llm-btn" data-type="summary" onclick="runLLMReview('summary')">
                            研究总结 <span class="cache-status" id="cache-summary"></span>
                        </button>
                        <button class="btn btn-warning btn-small llm-btn" data-type="findings" onclick="runLLMReview('findings')">
                            关键发现 <span class="cache-status" id="cache-findings"></span>
                        </button>
                        <button class="btn btn-warning btn-small llm-btn" data-type="clinical" onclick="runLLMReview('clinical')">
                            临床意义 <span class="cache-status" id="cache-clinical"></span>
                        </button>
                    </div>
                    <div style="margin-top: 8px; font-size: 0.85rem; color: #666;">
                        <span id="cacheHint">首次点击生成，再次点击直接查看缓存结果</span>
                        <button class="btn btn-secondary btn-small" onclick="clearLLMCache()" style="margin-left: 10px; font-size: 0.75rem; padding: 4px 10px;">清空缓存</button>
                    </div>
                </div>

                <div id="analysisResult" style="display: none;">
                    <div style="background: #f8f9fa; border-radius: 8px; padding: 20px; margin-top: 15px;">
                        <div id="analysisContent"></div>
                    </div>
                </div>
            </div>

            <!-- 标签页 -->
            <div class="card">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('articles')">文献列表</div>
                    <div class="tab" onclick="switchTab('journals')">期刊统计</div>
                    <div class="tab" onclick="switchTab('authors')">作者统计</div>
                    <div class="tab" onclick="switchTab('keywords')">关键词统计</div>
                    <div class="tab" onclick="switchTab('years')">年份分布</div>
                </div>

                <!-- 文献列表 -->
                <div class="tab-content active" id="tab-articles">
                    <div id="articlesList" class="article-list"></div>
                </div>

                <!-- 期刊统计 -->
                <div class="tab-content" id="tab-journals">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>排名</th><th>期刊名称</th><th>文献数量</th></tr>
                            </thead>
                            <tbody id="journalsTable"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 作者统计 -->
                <div class="tab-content" id="tab-authors">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>排名</th><th>作者</th><th>发文数量</th></tr>
                            </thead>
                            <tbody id="authorsTable"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 关键词统计 -->
                <div class="tab-content" id="tab-keywords">
                    <div id="keywordsCloud" style="padding: 20px;"></div>
                </div>

                <!-- 年份分布 -->
                <div class="tab-content" id="tab-years">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>年份</th><th>文献数量</th></tr>
                            </thead>
                            <tbody id="yearsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>PubMed 文献检索工具 | 数据来源于 NCBI PubMed 数据库</p>
    </footer>

    <script>
        let currentArticles = [];
        let currentQuery = '';
        let currentStats = {};

        // LLM 分析结果缓存
        let llmCache = {};
        let currentLLMType = '';

        // 更新缓存状态显示
        function updateCacheStatus() {
            const types = ['review', 'summary', 'findings', 'clinical'];
            types.forEach(type => {
                const statusEl = document.getElementById(`cache-${type}`);
                if (statusEl) {
                    if (llmCache[type]) {
                        statusEl.classList.add('cached');
                    } else {
                        statusEl.classList.remove('cached');
                    }
                }
            });

            // 更新提示文字
            const cachedCount = Object.keys(llmCache).length;
            const hintEl = document.getElementById('cacheHint');
            if (hintEl) {
                if (cachedCount > 0) {
                    hintEl.textContent = `已缓存 ${cachedCount}/4 个分析结果，点击可直接查看`;
                } else {
                    hintEl.textContent = '首次点击生成，再次点击直接查看缓存结果';
                }
            }
        }

        // 清空 LLM 缓存
        function clearLLMCache() {
            llmCache = {};
            currentLLMType = '';
            updateCacheStatus();

            // 清除按钮高亮
            document.querySelectorAll('#llmButtonGroup .llm-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 如果当前显示的是 LLM 结果，清空显示
            const analysisContent = document.getElementById('analysisContent');
            if (analysisContent && !document.getElementById('analysisResult').style.display === 'none') {
                analysisContent.innerHTML = '<div class="alert alert-info">缓存已清空，点击上方按钮重新生成</div>';
            }

            showAlert('缓存已清空', 'success');
        }

        // 显示 LLM 缓存结果
        function displayLLMResult(type) {
            const cache = llmCache[type];
            if (!cache) return false;

            const analysisContent = document.getElementById('analysisContent');
            const analysisResult = document.getElementById('analysisResult');

            const titles = {
                'review': 'AI 文献综述',
                'summary': 'AI 研究总结',
                'findings': 'AI 关键发现',
                'clinical': 'AI 临床意义分析'
            };

            analysisResult.style.display = 'block';
            analysisContent.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h4 style="margin: 0;">${titles[type] || 'AI 分析结果'}</h4>
                    <button class="btn btn-secondary btn-small" onclick="regenerateLLM('${type}')">重新生成</button>
                </div>
                <div style="padding: 15px; background: white; border-radius: 8px; line-height: 1.8;">${renderMarkdown(cache.content)}</div>
                <div style="margin-top: 10px; color: #999; font-size: 0.85rem;">基于 ${cache.articlesUsed} 篇文献生成 | 缓存于 ${cache.time}</div>
            `;

            return true;
        }

        // 重新生成 LLM 分析
        async function regenerateLLM(type) {
            delete llmCache[type];
            updateCacheStatus();
            await runLLMReview(type, true);
        }

        async function searchArticles() {
            const query = document.getElementById('query').value.trim();
            if (!query) {
                showAlert('请输入检索词', 'error');
                return;
            }

            const maxResults = parseInt(document.getElementById('max_results').value) || 50;
            const startYear = document.getElementById('start_year').value.trim();
            const endYear = document.getElementById('end_year').value.trim();
            const sortBy = document.getElementById('sort_by').value;
            const useDemo = document.getElementById('use_demo').checked;

            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query,
                        max_results: maxResults,
                        start_year: startYear,
                        end_year: endYear,
                        sort_by: sortBy,
                        use_demo: useDemo
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentArticles = data.articles;
                    currentQuery = data.query;
                    currentStats = data.stats;
                    displayResults(data.articles, data.stats, data.total);
                    document.getElementById('results').classList.add('active');
                    document.getElementById('downloadCard').style.display = 'block';
                    showAlert(`成功检索到 ${data.total} 篇文献`, 'success');
                } else {
                    showAlert(data.error || '检索失败', 'error');
                }
            } catch (error) {
                showAlert('请求失败: ' + error.message, 'error');
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        function displayResults(articles, stats, total) {
            // 显示分析面板
            document.getElementById('analysisCard').style.display = 'block';

            // 统计卡片
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h3>${total}</h3>
                    <p>检索到的文献</p>
                </div>
                <div class="stat-card">
                    <h3>${stats.year_range || '-'}</h3>
                    <p>年份范围</p>
                </div>
                <div class="stat-card">
                    <h3>${stats.top_journals?.length || 0}</h3>
                    <p>来源期刊</p>
                </div>
                <div class="stat-card">
                    <h3>${stats.top_authors?.length || 0}</h3>
                    <p>主要作者</p>
                </div>
            `;

            // 文献列表
            const articlesList = document.getElementById('articlesList');
            if (articles.length === 0) {
                articlesList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <p>未找到相关文献</p>
                    </div>
                `;
            } else {
                articlesList.innerHTML = articles.map((article, index) => `
                    <div class="article-card">
                        <div class="article-title">${index + 1}. ${escapeHtml(article.title || '无标题')}</div>
                        <div class="article-meta">
                            <span>作者: ${escapeHtml((article.authors || []).slice(0, 3).join(', '))}${(article.authors || []).length > 3 ? ' 等' : ''}</span>
                            <span>期刊: ${escapeHtml(article.journal || '-')}</span>
                            <span>年份: ${escapeHtml(article.year || '-')}</span>
                            <span>PMID: ${escapeHtml(article.pmid || '-')}</span>
                        </div>
                        <div class="article-abstract">${escapeHtml(article.abstract || '无摘要')}</div>
                        <div class="article-actions">
                            <button class="btn btn-primary btn-small" onclick="showDetail(${index})">查看详情</button>
                            <a href="${article.url}" target="_blank" class="btn btn-secondary btn-small">PubMed链接</a>
                        </div>
                    </div>
                `).join('');
            }

            // 期刊统计
            const journalsTable = document.getElementById('journalsTable');
            journalsTable.innerHTML = (stats.top_journals || []).map((j, i) => `
                <tr><td>${i + 1}</td><td>${escapeHtml(j[0])}</td><td>${j[1]}</td></tr>
            `).join('');

            // 作者统计
            const authorsTable = document.getElementById('authorsTable');
            authorsTable.innerHTML = (stats.top_authors || []).map((a, i) => `
                <tr><td>${i + 1}</td><td>${escapeHtml(a[0])}</td><td>${a[1]}</td></tr>
            `).join('');

            // 关键词云
            const keywordsCloud = document.getElementById('keywordsCloud');
            keywordsCloud.innerHTML = (stats.top_keywords || []).map(k => `
                <span class="tag tag-blue">${escapeHtml(k[0])} (${k[1]})</span>
            `).join('');

            // 年份分布
            const yearsTable = document.getElementById('yearsTable');
            const yearDist = stats.year_distribution || {};
            yearsTable.innerHTML = Object.entries(yearDist).sort().reverse().map(([year, count]) => `
                <tr><td>${year}</td><td>${count}</td></tr>
            `).join('');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function showDetail(index) {
            const article = currentArticles[index];
            if (!article) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px; color: #333; padding-right: 30px;">${escapeHtml(article.title || '无标题')}</h2>
                <div style="margin-bottom: 15px;">
                    <strong>作者:</strong> ${escapeHtml((article.authors || []).join(', ') || '-')}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>期刊:</strong> ${escapeHtml(article.journal || '-')} |
                    <strong>日期:</strong> ${escapeHtml(article.pub_date || '-')} |
                    <strong>年份:</strong> ${escapeHtml(article.year || '-')}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>PMID:</strong> ${escapeHtml(article.pmid || '-')} |
                    <strong>DOI:</strong> ${escapeHtml(article.doi || '-')}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>关键词:</strong> ${(article.keywords || []).map(k => `<span class="tag tag-green">${escapeHtml(k)}</span>`).join('')}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>MeSH主题词:</strong> ${(article.mesh_terms || []).map(m => `<span class="tag tag-purple">${escapeHtml(m)}</span>`).join('')}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>发表类型:</strong> ${escapeHtml((article.publication_types || []).join(', ') || '-')}
                </div>
                <div style="margin-bottom: 20px;">
                    <strong>摘要:</strong>
                    <p style="margin-top: 10px; line-height: 1.8; color: #555;">${escapeHtml(article.abstract || '无摘要').replace(/\n/g, '<br>')}</p>
                </div>
                <div class="button-group">
                    <a href="${article.url}" target="_blank" class="btn btn-primary">在 PubMed 中查看</a>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        async function generateReport(format) {
            if (!currentArticles.length) {
                showAlert('没有可生成的文献数据', 'error');
                return;
            }

            const reportTitle = document.getElementById('report_title').value.trim();

            try {
                const response = await fetch('/api/generate_report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articles: currentArticles,
                        query: currentQuery,
                        output_format: format,
                        report_title: reportTitle
                    })
                });

                const data = await response.json();

                if (data.success) {
                    const downloadLinks = document.getElementById('downloadLinks');
                    downloadLinks.innerHTML = data.files.map(f => `
                        <a href="/api/download/${encodeURIComponent(f)}" class="btn btn-success" download>
                            下载 ${f.endsWith('.docx') ? 'Word报告' : 'Excel表格'}: ${escapeHtml(f)}
                        </a>
                    `).join('');
                    showAlert('报告生成成功！', 'success');
                } else {
                    showAlert(data.error || '生成失败', 'error');
                }
            } catch (error) {
                showAlert('请求失败: ' + error.message, 'error');
            }
        }

        function clearResults() {
            currentArticles = [];
            currentQuery = '';
            currentStats = {};
            llmCache = {};
            currentLLMType = '';
            document.getElementById('results').classList.remove('active');
            document.getElementById('downloadCard').style.display = 'none';
            document.getElementById('downloadLinks').innerHTML = '';
            document.getElementById('analysisCard').style.display = 'none';
            document.getElementById('analysisResult').style.display = 'none';
            document.getElementById('analysisContent').innerHTML = '';
            document.getElementById('query').value = '';
            updateCacheStatus();

            // 清除所有按钮高亮
            document.querySelectorAll('#llmButtonGroup .llm-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        async function runAnalysis(analysisType) {
            if (!currentArticles.length) {
                showAlert('没有可分析的文献数据', 'error');
                return;
            }

            const analysisContent = document.getElementById('analysisContent');
            const analysisResult = document.getElementById('analysisResult');
            analysisResult.style.display = 'block';
            analysisContent.innerHTML = '<div class="loading active"><div class="spinner"></div><p>正在分析文献...</p></div>';

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articles: currentArticles,
                        query: currentQuery,
                        analysis_type: analysisType
                    })
                });

                const data = await response.json();

                if (data.success) {
                    displayAnalysisResult(data, analysisType);
                } else {
                    analysisContent.innerHTML = `<div class="alert alert-error">分析失败: ${escapeHtml(data.error)}</div>`;
                }
            } catch (error) {
                analysisContent.innerHTML = `<div class="alert alert-error">请求失败: ${escapeHtml(error.message)}</div>`;
            }
        }

        function displayAnalysisResult(data, analysisType) {
            const analysisContent = document.getElementById('analysisContent');
            let html = '';

            if (analysisType === 'topics' && data.topics) {
                html = '<h4>研究主题分析</h4>';
                html += '<div style="margin-top: 15px;">';
                data.topics.forEach((topic, i) => {
                    html += `<div style="margin-bottom: 15px; padding: 12px; background: white; border-radius: 8px; border-left: 4px solid #667eea;">`;
                    html += `<strong style="font-size: 1.1rem; color: #333;">${i + 1}. ${escapeHtml(topic.keyword)}</strong>`;
                    html += `<div style="color: #666; margin-top: 5px;">`;
                    html += `出现频次: ${topic.count} | 相关文献: ${topic.article_count} 篇`;
                    html += `</div></div>`;
                });
                html += '</div>';
            } else if (analysisType === 'trends' && data.trends) {
                html = '<h4>研究趋势分析</h4>';
                if (data.trends.yearly_trends) {
                    html += '<div style="margin-top: 15px;">';
                    Object.entries(data.trends.yearly_trends).forEach(([year, keywords]) => {
                        html += `<div style="margin-bottom: 10px; padding: 10px; background: white; border-radius: 8px;">`;
                        html += `<strong>${year}年:</strong> ${keywords.map(k => `<span class="tag tag-blue">${escapeHtml(k)}</span>`).join('')}`;
                        html += `</div>`;
                    });
                    html += '</div>';
                }
            } else if (analysisType === 'gaps' && data.gaps) {
                html = '<h4>知识缺口与研究局限</h4>';
                html += '<div style="margin-top: 15px;">';
                data.gaps.forEach((gap, i) => {
                    html += `<div style="margin-bottom: 12px; padding: 12px; background: white; border-radius: 8px; border-left: 4px solid #f5576c;">`;
                    html += `<span style="color: #f5576c; font-weight: bold;">${i + 1}.</span> ${escapeHtml(gap)}`;
                    html += `</div>`;
                });
                html += '</div>';
            } else if (analysisType === 'full' && data.analysis) {
                const analysis = data.analysis;
                html = '<h4>完整文献分析</h4>';

                // 研究主题
                if (analysis.research_topics) {
                    html += '<h5 style="margin-top: 20px; color: #667eea;">研究主题</h5>';
                    html += '<div style="margin-top: 10px;">';
                    analysis.research_topics.slice(0, 8).forEach((topic, i) => {
                        html += `<span class="tag tag-blue" style="font-size: 1rem; padding: 6px 14px;">${escapeHtml(topic.keyword)} (${topic.count})</span> `;
                    });
                    html += '</div>';
                }

                // 研究总结
                if (analysis.research_summary) {
                    const summary = analysis.research_summary;
                    html += '<h5 style="margin-top: 20px; color: #667eea;">研究概况</h5>';
                    html += `<div style="background: white; padding: 15px; border-radius: 8px; margin-top: 10px;">`;
                    html += `<p>总文献数: <strong>${summary.total_articles}</strong></p>`;
                    if (summary.diseases && summary.diseases.length) {
                        html += `<p style="margin-top: 8px;">主要研究疾病: ${summary.diseases.slice(0, 5).map(d => `<span class="tag tag-purple">${escapeHtml(d[0])}</span>`).join(' ')}</p>`;
                    }
                    if (summary.interventions && summary.interventions.length) {
                        html += `<p style="margin-top: 8px;">主要干预措施: ${summary.interventions.slice(0, 5).map(d => `<span class="tag tag-green">${escapeHtml(d[0])}</span>`).join(' ')}</p>`;
                    }
                    html += '</div>';
                }

                // 知识缺口
                if (analysis.knowledge_gaps && analysis.knowledge_gaps.length) {
                    html += '<h5 style="margin-top: 20px; color: #f5576c;">知识缺口</h5>';
                    html += '<div style="margin-top: 10px;">';
                    analysis.knowledge_gaps.slice(0, 5).forEach((gap, i) => {
                        html += `<div style="margin-bottom: 8px; padding: 10px; background: white; border-radius: 8px; font-size: 0.9rem;">`;
                        html += `<span style="color: #f5576c;">${i + 1}.</span> ${escapeHtml(gap)}`;
                        html += `</div>`;
                    });
                    html += '</div>';
                }
            }

            analysisContent.innerHTML = html || '<div class="alert alert-info">暂无分析结果</div>';
        }

        async function runLLMReview(reviewType, forceRegenerate = false) {
            if (!currentArticles.length) {
                showAlert('没有可分析的文献数据', 'error');
                return;
            }

            // 更新按钮高亮
            document.querySelectorAll('#llmButtonGroup .llm-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeBtn = document.querySelector(`#llmButtonGroup .llm-btn[data-type="${reviewType}"]`);
            if (activeBtn) activeBtn.classList.add('active');

            currentLLMType = reviewType;

            // 检查缓存（如果不是强制重新生成）
            if (!forceRegenerate && llmCache[reviewType]) {
                displayLLMResult(reviewType);
                return;
            }

            const apiKey = document.getElementById('llmApiKey').value.trim();
            const analysisContent = document.getElementById('analysisContent');
            const analysisResult = document.getElementById('analysisResult');
            analysisResult.style.display = 'block';
            analysisContent.innerHTML = '<div class="loading active"><div class="spinner"></div><p>正在生成智能综述，这可能需要一些时间...</p></div>';

            try {
                const response = await fetch('/api/llm_review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articles: currentArticles,
                        query: currentQuery,
                        review_type: reviewType,
                        api_key: apiKey
                    })
                });

                const data = await response.json();

                // 提取内容（无论成功失败，只要有内容就显示和缓存）
                let title = '';
                let content = '';
                if (reviewType === 'review') {
                    title = 'AI 文献综述';
                    content = data.review || data.error || '无内容';
                } else if (reviewType === 'summary') {
                    title = 'AI 研究总结';
                    content = data.summary || data.error || '无内容';
                } else if (reviewType === 'findings') {
                    title = 'AI 关键发现';
                    content = data.findings || data.error || '无内容';
                } else if (reviewType === 'clinical') {
                    title = 'AI 临床意义分析';
                    content = data.clinical_analysis || data.error || '无内容';
                }

                if (content && content !== '无内容') {
                    // 保存到缓存
                    llmCache[reviewType] = {
                        content: content,
                        articlesUsed: data.articles_used || currentArticles.length,
                        time: new Date().toLocaleString('zh-CN')
                    };
                    updateCacheStatus();

                    // 显示结果
                    displayLLMResult(reviewType);
                } else {
                    analysisContent.innerHTML = `<div class="alert alert-error">生成失败: ${escapeHtml(data.error || '未知错误')}</div>`;
                }
            } catch (error) {
                analysisContent.innerHTML = `<div class="alert alert-error">请求失败: ${escapeHtml(error.message)}</div>`;
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            document.querySelector('.container').insertBefore(alertDiv, document.querySelector('.container').children[1]);
            setTimeout(() => alertDiv.remove(), 5000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 简单的 Markdown 渲染
        function renderMarkdown(text) {
            if (!text) return '';

            let html = escapeHtml(text);

            // 标题
            html = html.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // 粗体
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');

            // 斜体
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.*?)_/g, '<em>$1</em>');

            // 行内代码
            html = html.replace(/`(.*?)`/g, '<code style="background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-family: monospace;">$1</code>');

            // 无序列表
            html = html.replace(/^\- (.*$)/gim, '<li style="margin-left: 20px;">$1</li>');
            html = html.replace(/^\* (.*$)/gim, '<li style="margin-left: 20px;">$1</li>');

            // 有序列表
            html = html.replace(/^\d+\. (.*$)/gim, '<li style="margin-left: 20px;">$1</li>');

            // 换行
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        // 输出格式按钮切换
        let currentFormat = 'both';
        function selectFormat(btn, format) {
            currentFormat = format;
            const buttons = document.querySelectorAll('#reportFormatGroup .format-btn');
            buttons.forEach(b => {
                b.classList.remove('btn-success', 'active');
                b.classList.add('btn-secondary');
            });
            btn.classList.remove('btn-secondary');
            btn.classList.add('btn-success', 'active');
        }

        // 分析类型按钮切换
        let currentAnalysisType = 'full';
        function selectAnalysisType(btn, type) {
            currentAnalysisType = type;
            const buttons = document.querySelectorAll('#analysisTypeGroup .analysis-btn');
            buttons.forEach(b => {
                b.classList.remove('btn-primary', 'active');
                b.classList.add('btn-secondary');
            });
            btn.classList.remove('btn-secondary');
            btn.classList.add('btn-primary', 'active');
            // 自动执行分析
            runAnalysis(type);
        }

        // 修改 generateReport 使用当前选中的格式
        const originalGenerateReport = generateReport;
        generateReport = function(format) {
            // 更新按钮状态
            const btn = document.querySelector(`#reportFormatGroup .format-btn[data-format="${format}"]`);
            if (btn) selectFormat(btn, format);
            // 调用原函数
            return originalGenerateReport(format);
        };

        // 点击模态框外部关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 回车键搜索
        document.getElementById('query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchArticles();
        });
    </script>
</body>
